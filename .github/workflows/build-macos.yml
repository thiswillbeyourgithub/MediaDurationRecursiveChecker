name: Build macOS App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-14
            arch: arm64
            name: macos-14-M1-silicon
          - os: macos-15-intel
            arch: x86_64
            name: macos-15-intel
          - os: macos-15
            arch: arm64
            name: macos-15-M1-silicon

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build .app
        run: |
          pyinstaller \
            --onefile \
            --windowed \
            --name MediaDurationRecursiveChecker \
            --hidden-import=imageio_ffmpeg \
            --copy-metadata imageio \
            --clean \
            MediaDurationRecursiveChecker.py

      - name: Zip .app bundle
        run: |
          cd dist
          zip -r ../MediaDurationRecursiveChecker-macos-${{ matrix.name }}.zip MediaDurationRecursiveChecker.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MediaDurationRecursiveChecker-macos-${{ matrix.name }}
          path: MediaDurationRecursiveChecker-macos-${{ matrix.name }}.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            MediaDurationRecursiveChecker-macos-macos-14-M1-silicon/macos-14-M1-silicon.zip
            MediaDurationRecursiveChecker-macos-macos-15-intel/macos-15-intel.zip
            MediaDurationRecursiveChecker-macos-macos-15-M1-silicon/macos-15-M1-silicon.zip
